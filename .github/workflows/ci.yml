name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  # Allow deploy.yml to invoke this as a reusable CI gate.
  workflow_call:

# Least privilege: tests only read the repo.
permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cb
          POSTGRES_PASSWORD: cb
          POSTGRES_DB: cbstudios_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cb -d cbstudios_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The vitest harness defaults to host port 5435 locally, but the CI
      # postgres service is exposed on 5432 — set the DB envs explicitly so
      # tests connect to the right port.
      DATABASE_URL: postgres://cb:cb@localhost:5432/cbstudios_test
      TEST_DATABASE_URL: postgres://cb:cb@localhost:5432/cbstudios_test
      JWT_SECRET: test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Drop the (macOS-generated) lockfile and install fresh so the linux
        # rollup/esbuild native binaries resolve — `npm ci` honors a
        # cross-platform lockfile and omits them (npm/cli#4828). Same approach
        # the Dockerfiles use.
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Ensure test database exists
        # The postgres service already creates cbstudios_test via POSTGRES_DB;
        # this is an idempotent safety net in case the DB name ever changes.
        run: |
          PGPASSWORD=cb psql -h localhost -p 5432 -U cb -d postgres \
            -tc "SELECT 1 FROM pg_database WHERE datname = 'cbstudios_test'" \
            | grep -q 1 \
            || PGPASSWORD=cb psql -h localhost -p 5432 -U cb -d postgres \
              -c "CREATE DATABASE cbstudios_test"

      - name: Run database migrations (test DB)
        # migrate.ts reads DATABASE_URL; point it explicitly at the test DB so
        # the two never silently diverge from the harness's TEST_DATABASE_URL.
        run: DATABASE_URL="$TEST_DATABASE_URL" npm -w apps/api run db:migrate

      - name: Test apps/api
        run: npm -w apps/api run test

      - name: Test apps/web
        run: npm -w apps/web run test

      - name: Test packages/shared
        run: npm -w packages/shared run test
