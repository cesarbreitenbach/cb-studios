# Deploy — mirrors the cb-faucet (Luckyblock) pattern: push to main -> CI gate
# -> SSH to the shared server and run the server-side deploy script.
name: Deploy

on:
  push:
    branches:
      - main

# Least privilege: deploy only reads the repo; the SSH deploy uses secrets.
permissions:
  contents: read

# Only one production deploy at a time.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to production
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run deploy script on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/cb-studios && ./scripts/ci-deploy.sh ${{ github.sha }}"
