# CB Studios — production compose.
# Runs on the same host as Probody / cb-faucet (Luckyblock) / cb-fitness,
# behind the shared Probody Caddy (container "probody_proxy", image caddy:latest).
#
# Integration mirrors cb-faucet: this stack owns an EXTERNAL docker network
# "cb-studios-net"; the Probody Caddy joins that network and reverse-proxies to
# cb_studios_web:3000 by container name (exactly like it reaches cb_faucet_app).
#
# Secrets (POSTGRES_PASSWORD, JWT_SECRET) come from a gitignored .env placed
# next to this compose on the server. NO secret values are hardcoded.

services:
  cb-db:
    image: postgres:16
    container_name: cb_studios_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cbstudios
    volumes:
      - cb-db-data:/var/lib/postgresql/data
    networks:
      - cb-internal
    ports:
      # Bound to the SERVER's localhost only (not 0.0.0.0) — not exposed to the
      # internet. Lets DBeaver reach the DB over an SSH tunnel, same as
      # probody/faucet. Host port 5434 (probody already uses 5432).
      - "127.0.0.1:5434:5432"

  cb-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cb_studios_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cb:${POSTGRES_PASSWORD}@cb-db:5432/cbstudios
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - cb-db
    expose:
      - "3001"
    networks:
      - cb-internal
    # Entrypoint (in the Dockerfile) runs db:migrate then start on boot.

  cb-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cb_studios_web
    restart: unless-stopped
    environment:
      API_BASE: http://cb-api:3001
      ORIGIN: https://agendou.vip
      BASE_DOMAIN: agendou.vip
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - cb-api
    expose:
      - "3000"
    networks:
      # Internal network for talking to cb-api.
      - cb-internal
      # Shared external network so Probody's Caddy can reverse_proxy to
      # cb_studios_web:3000 (Caddy joins this same network — see DEPLOY.md).
      - cb-studios-net

volumes:
  cb-db-data:

networks:
  cb-internal:
    driver: bridge
  cb-studios-net:
    external: true
    name: cb-studios-net
