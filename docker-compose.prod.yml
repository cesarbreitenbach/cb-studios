# CB Studios — production compose.
# Secrets (POSTGRES_PASSWORD, JWT_SECRET) come from a gitignored .env file
# placed next to this compose on the server. NO secret values are hardcoded.
#
# TLS for *.agendou.vip is terminated by the existing Probody Caddy container,
# which reaches cb-web over the shared external "caddy" network by service name.

services:
  cb-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: cb
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cbstudios
    volumes:
      - cb-db-data:/var/lib/postgresql/data
    networks:
      - cb-internal
    # No published host port — reachable only on the internal network.

  cb-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://cb:${POSTGRES_PASSWORD}@cb-db:5432/cbstudios
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - cb-db
    expose:
      - "3001"
    networks:
      - cb-internal
    # Entrypoint (in the Dockerfile) runs db:migrate then start on boot.

  cb-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      API_BASE: http://cb-api:3001
      ORIGIN: https://agendou.vip
      BASE_DOMAIN: agendou.vip
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - cb-api
    expose:
      - "3000"
    networks:
      # Internal network for talking to cb-api.
      - cb-internal
      # Shared external network so Probody's Caddy can reverse_proxy to cb-web:3000.
      - caddy

volumes:
  cb-db-data:

networks:
  cb-internal:
    driver: bridge
  caddy:
    external: true
